<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FREQUENCY">
<meta name="theme-color" content="#E6E4DF">
<title>FREQUENCY — App Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --mist-0:#F2F1EE;
    --mist-1:#E8E6E1;
    --mist-2:#DCDAD4;
    --mist-3:#C4C1BA;
    --mist-4:#A4A19A;
    --graphite:#2A2826;
    --ink:#141211;
    --ink-70:rgba(20,18,17,.72);
    --ink-55:rgba(20,18,17,.55);
    --ink-35:rgba(20,18,17,.35);
    --ink-15:rgba(20,18,17,.15);
    --signal:#197A3E;
    --signal-dim:#2E8C4F;
    --amber:#E96A2A;
    --m-kodak:#C9A044;
    --m-velvia:#A94A3E;
    --m-polaroid:#BE7E80;
    --m-ekta:#516E94;
    --m-mint:#6E9883;
    --m-sepia:#7D6143;
    --m-lavender:#8F779E;
    --m-burnt:#A95C34;
    --mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
    --sans:"Inter", -apple-system, "Pretendard Variable", system-ui, sans-serif;
  }
  html,body{margin:0;padding:0;background:var(--mist-0);color:var(--ink);font-family:var(--sans);height:100%;overscroll-behavior:none;}
  *{box-sizing:border-box;}

  .cap{
    background:var(--mist-1); border-radius:6px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.7),
      inset 0 -1.5px 0 rgba(0,0,0,.05),
      0 1px 0 var(--mist-3),
      0 2px 2px rgba(0,0,0,.04);
    transition: transform 120ms cubic-bezier(0.2,0,0,1), box-shadow 120ms;
  }
  .cap:active{
    transform: translateY(1px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.5),
      inset 0 -1px 0 rgba(0,0,0,.03),
      0 0 0 var(--mist-3);
  }
  .cap-amber{ background:var(--amber); color:#fff;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35), inset 0 -1.5px 0 rgba(0,0,0,.12), 0 1px 0 #A8471E, 0 2px 3px rgba(0,0,0,.08);
  }
  .cap-graphite{ background:var(--graphite); color:var(--mist-0);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1.5px 0 rgba(0,0,0,.3), 0 1px 0 #000, 0 2px 3px rgba(0,0,0,.12);
  }
  .well{
    background:#E2E0DB; border-radius:4px;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,.08),
      inset 0 -1px 0 rgba(255,255,255,.5),
      0 0 0 1px rgba(0,0,0,.04);
  }
  .mono{ font-family:var(--mono); letter-spacing:.04em; }
  .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-55); font-weight:500; }
  .lbl-dk{ font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:rgba(242,241,238,.5); font-weight:500; }
  @keyframes breathe { 0%,100%{opacity:.55; transform:scale(1);} 50%{opacity:1; transform:scale(1.15);} }
  .signal-dot{ width:6px; height:6px; border-radius:50%; background:var(--signal); animation: breathe 1.8s ease-in-out infinite; display:inline-block; }
  .slot-empty{
    border:1px dashed var(--mist-4);
    background: repeating-linear-gradient(45deg, transparent 0 6px, rgba(0,0,0,.025) 6px 7px);
  }
  .film-stripe{
    background:
      repeating-linear-gradient(135deg, rgba(0,0,0,.035) 0 2px, transparent 2px 7px),
      linear-gradient(180deg, #D7D4CE, #CAC7C0);
  }
  @keyframes retroblink { 0%, 49% { opacity:1; } 50%, 100% { opacity:0; } }
  .crt-cursor{
    display:inline-block; width:.58em; height:1em;
    background: var(--amber);
    vertical-align: -0.12em; margin-left: 2px;
    animation: retroblink 1.05s steps(1) infinite;
    box-shadow: 0 0 8px rgba(233,106,42,.5);
  }
  .crt-cursor-sm{ width:.48em; height:.86em; }
  .crt-cursor-green{ background: var(--signal); box-shadow: 0 0 8px rgba(25,122,62,.4); }
  .no-scrollbar::-webkit-scrollbar{display:none;}
  .no-scrollbar{ scrollbar-width:none; }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase;
    padding:3px 6px; border-radius:0;
    background:var(--mist-1); color:var(--ink); font-weight:500;
    box-shadow: inset 0 0 0 1px var(--mist-3);
  }
  .chip .sw{ width:6px; height:6px; background:currentColor; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  // Cache-busting: jsx 파일들에 1분 단위 토큰 박아서 iOS Safari 등의 강한 캐시 무력화
  // 푸시 후 최대 1~2분(GitHub Pages 빌드) + 1분(토큰 갱신) = 최대 3분 후 최신 버전 보장
  // 같은 분 내 새로고침은 캐시 사용 → 트래픽 낭비 없음
  (function () {
    var buster = Math.floor(Date.now() / 60000);
    var files = ['ios-frame', 'freq-shared', 'freq-screens', 'freq-mobile-router'];
    files.forEach(function (name) {
      document.write('<script type="text/babel" src="' + name + '.jsx?v=' + buster + '"><\/script>');
    });
  })();
</script>

</body>
</html>
