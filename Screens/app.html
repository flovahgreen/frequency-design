<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FREQUENCY">
<meta name="theme-color" content="#F0E8D8">
<title>FREQUENCY — App Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  /* ═══════════════════════════════════════════════════════════════
     FREQUENCY · v3 Design Tokens · 90s Japan Polycarbonate
     - Bg: warm cream (#F0E8D8)
     - Text: warm dark brown (#2D2620)
     - Pink primary action (--amber semantic kept, value swapped)
     - Fluorescent green LED/signal
     - Rounded corners (8~14px), polycarbonate glossy surfaces
     - Type: M PLUS Rounded 1c (Latin) + Pretendard (Korean)
     ═══════════════════════════════════════════════════════════════ */
  :root{
    /* surface tones — cream paper / polycarbonate */
    --mist-0:#F0E8D8;            /* base bg */
    --mist-1:#F8F2E2;            /* light panel */
    --mist-2:#ECE2CC;            /* sub-panel */
    --mist-3:rgba(58,51,42,.18); /* soft border */
    --mist-4:rgba(58,51,42,.4);  /* stronger border */
    --graphite:#3A332A;          /* warm brown (was near-black) */
    --ink:#2D2620;               /* warm dark text */
    --ink-70:rgba(45,38,32,.72);
    --ink-55:rgba(45,38,32,.55);
    --ink-35:rgba(45,38,32,.35);
    --ink-15:rgba(45,38,32,.15);

    /* signal · LED · primary action */
    --signal:#65BE3F;            /* fluorescent green (text-friendly) */
    --signal-bright:#B5FF44;     /* LED dot bright variant */
    --signal-dim:#8FD05A;
    --amber:#FF77A8;             /* semantic name kept, hot pink primary CTA */
    --amber-dim:#FF99BD;

    /* member identity colors — v3 90s Japan polycarbonate (candy / fluorescent) */
    --m-kodak:#F5C84B;     /* golden yellow */
    --m-velvia:#FF5A5A;    /* coral red (구분 위해 amber pink와 분리) */
    --m-polaroid:#FFB7C5;  /* bubblegum blush */
    --m-ekta:#4A78D6;      /* electric iris blue */
    --m-mint:#5DDDA7;      /* fluorescent mint */
    --m-sepia:#C68A5E;     /* warm caramel */
    --m-lavender:#B57FE5;  /* light purple */
    --m-burnt:#FF7A3C;     /* vivid orange */

    /* type */
    --mono:"M PLUS Rounded 1c", "Pretendard Variable", "Pretendard", system-ui, monospace;
    --sans:"M PLUS Rounded 1c", "Pretendard Variable", "Pretendard", -apple-system, system-ui, sans-serif;
  }
  html,body{margin:0;padding:0;background:var(--mist-0);color:var(--ink);font-family:var(--sans);height:100%;overscroll-behavior:none;}
  *{box-sizing:border-box;}

  /* ── KEYCAP · polycarbonate gloss button ── */
  .cap{
    background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.55));
    color: var(--ink);
    border-radius:12px;
    border:1.5px solid var(--mist-3);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.85),
      0 1px 2px rgba(58,51,42,.08),
      0 2px 4px rgba(58,51,42,.05);
    transition: transform 120ms cubic-bezier(0.2,0,0,1), box-shadow 120ms;
  }
  .cap:active{
    transform: translateY(1px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.5),
      0 1px 1px rgba(58,51,42,.06);
  }
  .cap-amber{
    background: linear-gradient(180deg, var(--amber-dim), var(--amber));
    color:#FFFFFF;
    border-color: rgba(232,74,107,.4);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.4),
      0 2px 4px rgba(255,119,168,.35);
  }
  .cap-graphite{
    background: linear-gradient(180deg, #5A4F40, #3A332A);
    color: var(--mist-0);
    border-color: rgba(58,51,42,.5);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.08),
      0 1px 2px rgba(0,0,0,.2);
  }

  /* ── WELL · translucent input panel ── */
  .well{
    background: linear-gradient(180deg, rgba(255,255,255,.7), rgba(255,255,255,.4));
    border-radius:10px;
    border:1.5px solid var(--mist-3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
  }

  /* ── TYPE utilities ── */
  .mono{ font-family:var(--mono); letter-spacing:.04em; }
  .lbl{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-55); font-weight:700; }
  .lbl-dk{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:rgba(240,232,216,.6); font-weight:700; }

  /* ── SIGNAL · LED with fluorescent glow ── */
  @keyframes breathe { 0%,100%{opacity:.7; transform:scale(1);} 50%{opacity:1; transform:scale(1.18);} }
  .signal-dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--signal-bright);
    box-shadow:
      0 0 8px rgba(181,255,68,.85),
      inset 0 1px 1px rgba(255,255,255,.6);
    animation: breathe 1.8s ease-in-out infinite;
    display:inline-block;
  }

  .slot-empty{
    border:1.5px dashed var(--mist-4);
    border-radius:8px;
    background: repeating-linear-gradient(45deg, transparent 0 6px, rgba(58,51,42,.03) 6px 7px);
  }
  .film-stripe{
    background:
      repeating-linear-gradient(135deg, rgba(58,51,42,.04) 0 2px, transparent 2px 7px),
      linear-gradient(180deg, #E5DBC4, #D8CDB3);
  }

  /* ── CRT cursor (now pink to match new --amber) ── */
  @keyframes retroblink { 0%, 49% { opacity:1; } 50%, 100% { opacity:0; } }
  .crt-cursor{
    display:inline-block; width:.58em; height:1em;
    background: var(--amber);
    vertical-align: -0.12em; margin-left: 2px;
    animation: retroblink 1.05s steps(1) infinite;
    box-shadow: 0 0 8px rgba(255,119,168,.55);
  }
  .crt-cursor-sm{ width:.48em; height:.86em; }
  .crt-cursor-green{ background: var(--signal-bright); box-shadow: 0 0 8px rgba(181,255,68,.6); }

  .no-scrollbar::-webkit-scrollbar{display:none;}
  .no-scrollbar{ scrollbar-width:none; }

  /* ── CHIP · rounded polycarbonate badge ── */
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    padding:4px 8px; border-radius:8px;
    background: linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45));
    color:var(--ink); font-weight:700;
    border:1px solid var(--mist-3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
  }
  .chip .sw{ width:6px; height:6px; background:currentColor; border-radius:2px; }

  /* ═══ 한글 폰트 글로벌 스케일링 (Pretendard 적용 → 105%로 다소 완화) ═══
     M PLUS Rounded 1c는 한글 미지원 → Pretendard로 폴백.
     인라인 px 사이즈는 자동 스케일 안 됨. 필요시 컴포넌트에서 개별 조정. */
  body.lang-kr { font-size: 16px; }
  body.lang-kr .lbl       { font-size: 10.5px; }
  body.lang-kr .lbl-dk    { font-size: 10.5px; }
  body.lang-kr .mono      { font-size: 10.5px; letter-spacing: .03em; }
  body.lang-kr .chip      { font-size: 10.5px; }
  body.lang-kr input,
  body.lang-kr textarea   { font-size: 16px; }
  body.lang-kr button     { font-size: inherit; }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  // Cache-busting: jsx 파일들에 1분 단위 토큰 박아서 iOS Safari 등의 강한 캐시 무력화
  // 푸시 후 최대 1~2분(GitHub Pages 빌드) + 1분(토큰 갱신) = 최대 3분 후 최신 버전 보장
  // 같은 분 내 새로고침은 캐시 사용 → 트래픽 낭비 없음
  (function () {
    var buster = Math.floor(Date.now() / 60000);
    var files = ['ios-frame', 'freq-shared', 'freq-screens', 'freq-mobile-router'];
    files.forEach(function (name) {
      document.write('<script type="text/babel" src="' + name + '.jsx?v=' + buster + '"><\/script>');
    });
  })();
</script>

</body>
</html>
